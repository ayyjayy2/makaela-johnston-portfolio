name: Project Board Automation

on:
  pull_request:
    types: [opened, reopened, closed]
  push:
    branches:
      - 'MJ-*'

env:
  PROJECT_ID: PVT_kwHOA1MSD84BTorJ
  STATUS_FIELD_ID: PVTSSF_lAHOA1MSD84BTorJzhA2VcM
  STATUS_IN_PROGRESS: 47fc9ee4
  STATUS_IN_REVIEW: df73e18b
  STATUS_DONE: 98236657

jobs:
  # When a MJ-XX branch is pushed (no PR yet) → move linked issue to In Progress
  branch-in-progress:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/MJ-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract MJ number from branch name
        id: extract
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          MJ_NUM=$(echo "$BRANCH" | grep -oP 'MJ-\K[0-9]+' | sed 's/^0*//')
          echo "mj_num=$MJ_NUM" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH, MJ number: $MJ_NUM"

      - name: Move issue to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const mjNum = parseInt('${{ steps.extract.outputs.mj_num }}');
            // Issues were created starting at MJ-02 (issue #4), so issue number = mjNum + 2
            const issueNumber = mjNum + 2;

            // Get the project item for this issue
            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber
            });

            const items = result.repository.issue?.projectItems?.nodes || [];
            const item = items.find(i => i.project.id === process.env.PROJECT_ID);
            if (!item) return console.log(`No project item found for issue #${issueNumber}`);

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_IN_PROGRESS
            });
            console.log(`Moved issue #${issueNumber} to In Progress`);

  # When a PR is opened → move linked issue to In Review
  pr-in-review:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Extract MJ number from PR title
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          MJ_NUM=$(echo "$TITLE" | grep -oP 'MJ-\K[0-9]+' | head -1 | sed 's/^0*//')
          echo "mj_num=$MJ_NUM" >> $GITHUB_OUTPUT
          echo "PR title: $TITLE, MJ number: $MJ_NUM"

      - name: Move item to In Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const mjNum = parseInt('${{ steps.extract.outputs.mj_num }}');
            const issueNumber = mjNum + 2;

            // For MJ-01, the PR itself is on the board — find it by PR number
            const isMJ01 = mjNum === 1;
            const query = isMJ01 ? `
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }
            ` : `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ...(isMJ01
                ? { prNumber: context.payload.pull_request.number }
                : { issueNumber })
            });

            const obj = isMJ01
              ? result.repository.pullRequest
              : result.repository.issue;
            const items = obj?.projectItems?.nodes || [];
            const item = items.find(i => i.project.id === process.env.PROJECT_ID);
            if (!item) return console.log('No project item found');

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_IN_REVIEW
            });
            console.log(`Moved item to In Review`);

  # When a PR is merged → move linked issue to Done
  pr-done:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract MJ number from PR title
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          MJ_NUM=$(echo "$TITLE" | grep -oP 'MJ-\K[0-9]+' | head -1 | sed 's/^0*//')
          echo "mj_num=$MJ_NUM" >> $GITHUB_OUTPUT

      - name: Move item to Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const mjNum = parseInt('${{ steps.extract.outputs.mj_num }}');
            const issueNumber = mjNum + 2;
            const isMJ01 = mjNum === 1;

            const query = isMJ01 ? `
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }
            ` : `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ...(isMJ01
                ? { prNumber: context.payload.pull_request.number }
                : { issueNumber })
            });

            const obj = isMJ01
              ? result.repository.pullRequest
              : result.repository.issue;
            const items = obj?.projectItems?.nodes || [];
            const item = items.find(i => i.project.id === process.env.PROJECT_ID);
            if (!item) return console.log('No project item found');

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, {
              projectId: process.env.PROJECT_ID,
              itemId: item.id,
              fieldId: process.env.STATUS_FIELD_ID,
              optionId: process.env.STATUS_DONE
            });
            console.log(`Moved item to Done`);
